<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="utf-8">
    <title>Scrap App</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="shortcut icon" href="images/icons/icon-72x72.png">
    <!-- start of web manifest -->
   
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fancybox/3.5.7/jquery.fancybox.min.css"/>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/fancybox/3.5.7/jquery.fancybox.min.js"></script>
    
	
    <script> </script>

</head>
<body>
	<div id="myvid"></div>
    <a class="fancyvid" data-fancybox href="https://www.youtube.com/watch?v=ygk8zpMr7TY">
        YouTube video
    </a>
    <script>
      // 2. This code loads the IFrame Player API code asynchronously.
      var tag = document.createElement('script');

      tag.src = "https://www.youtube.com/iframe_api";
      var firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

      // 3. This function creates an <iframe> (and YouTube player)
      //    after the API code downloads.
      var player;
      function onYouTubeIframeAPIReady() {
        $('.fancyvid').fancybox({
            afterShow : function(intance){                
                var id = $.fancybox.getInstance().current.$iframe.attr('id');

                var pl = new YT.Player(id, {
                    events: {
                        playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 0 },
                        videoId: 'ygk8zpMr7TY',
                        events: {
                            'onReady': function(){
                                console.log("Hello")
                            }
                        }
                    }
                });
                
            }
        });
      }

      // 4. The API will call this function when the video player is ready.
      function onPlayerReady(event) {
        event.target.setVolume(100);
        event.target.playVideo();
      }

     
    </script>

    
   

</body>
</html>
